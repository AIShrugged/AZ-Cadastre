# Garage UI Backend Configuration

server:
  host: "::"
  port: 8080
  environment: "development"
  domain: "localhost"
  protocol: "http"
  root_url: "http://localhost:8080"
  max_body_size: 314572800

# Garage S3 Configuration
garage:
  endpoint: "http://localhost:3900"
  region: "garage"
  admin_endpoint: "http://localhost:3903"
  admin_token: "4467c0ddfc2e279a674d7cca.Swn85_H468vgJVtv4bGc49bBRNnIP_LPjO8tcmeba5k"

auth:
  jwt_private_key: ""
  metrics_public: false
  token:
    enabled: true
  oidc:
    enabled: false

cors:
  enabled: true
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
  allow_credentials: false
  max_age: 3600

logging:
  level: "info"
  format: "text"
